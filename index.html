<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content Security Policy. Tightens XSS blast radius on top of React's
      default escaping. 'unsafe-inline' for style is needed by Vite/Tailwind
      injected styles; script is locked to self + Google Identity Services.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://accounts.google.com https://apis.google.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://lh3.googleusercontent.com https://*.googleusercontent.com;
      connect-src 'self' https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://sheets.googleapis.com;
      frame-src https://accounts.google.com;
      manifest-src 'self';
      worker-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'none';
    " />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#F4A261" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MoneyB" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!--
      SPA route restore: 404.html on GitHub Pages converts the requested path
      into ?p=/foo so static hosting still serves index.html. Here we rewrite
      the URL back before React Router boots.
    -->
    <script>
      (function () {
        var q = location.search;
        if (q && q.indexOf('?p=') === 0) {
          var rest = decodeURIComponent(q.slice(3));
          var base = location.pathname.replace(/\/$/, '');
          history.replaceState(null, '', base + rest + location.hash);
        }
      })();
    </script>
